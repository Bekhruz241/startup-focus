<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFocus - Pomodoro & Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit for a modern, premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs (using compat for simpler CDN scripting) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="background-animation"></div>
    
    <!-- Authentication Screen -->
    <div id="authScreen" class="auth-container glass-panel">
        <div class="auth-content">
            <i class="fa-solid fa-graduation-cap auth-logo"></i>
            <h2>Welcome to StudyFocus</h2>
            <p>Sign in to sync your study tasks and custom timers.</p>
            <button id="googleSignInBtn" class="google-btn">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>
            <p class="auth-note" id="authErrorMsg"></p>
        </div>
    </div>

    <!-- Main App Container (Hidden initially) -->
    <div id="appScreen" class="container glass-panel" style="display: none;">
        <header>
            <div class="header-content">
                <h1><i class="fa-solid fa-graduation-cap"></i> StudyFocus</h1>
                <p>Elevate your concentration</p>
            </div>
            <div class="header-actions">
                <button id="settingsBtn" class="icon-btn tooltip" data-tooltip="Settings">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <div class="user-profile tooltip" data-tooltip="Sign out" id="logoutBtn">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" alt="User">
                </div>
            </div>
        </header>

        <section class="pomodoro-section">
            <div class="timer-mode">
                <button class="mode-btn active" id="pomodoroMode">Pomodoro</button>
                <button class="mode-btn" id="shortBreakMode">Short Break</button>
            </div>
            
            <div class="timer-display neon-glow">
                <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>

            <div class="timer-controls">
                <button class="control-btn play-btn" id="startBtn">
                    <i class="fa-solid fa-play"></i> Start
                </button>
                <button class="control-btn pause-btn" id="pauseBtn" style="display: none;">
                    <i class="fa-solid fa-pause"></i> Pause
                </button>
                <button class="control-btn reset-btn" id="resetBtn">
                    <i class="fa-solid fa-rotate-right"></i> Reset
                </button>
            </div>
        </section>

        <!-- True Music Player Section (YouTube API) -->
        <section class="music-section">
            <div class="music-header">
                <h3><i class="fa-solid fa-headphones"></i> Lofi Study Beats</h3>
                <span class="music-status" id="musicStatus">Loading...</span>
            </div>
            
            <div class="custom-music-controls">
                <button id="musicPlayPauseBtn" class="music-btn play" disabled>
                    <i class="fa-solid fa-play"></i>
                </button>
                <div class="volume-container">
                    <i class="fa-solid fa-volume-low"></i>
                    <input type="range" id="musicVolume" min="0" max="100" value="50" disabled>
                    <i class="fa-solid fa-volume-high"></i>
                </div>
            </div>
            
            <!-- Hidden YouTube Player Container -->
            <div id="ytPlayerContainer" style="position: absolute; width: 0; height: 0; overflow: hidden; left: -9999px;">
                <div id="ytPlayer"></div>
            </div>
        </section>

        <section class="task-section">
            <div class="task-header">
                <h2>Tasks for Today</h2>
                <span id="taskCount" class="task-count">0</span>
            </div>
            
            <div class="task-input-container">
                <input type="text" id="taskInput" placeholder="What are you working on?">
                <button id="addTaskBtn" class="add-task-btn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <ul class="task-list" id="taskList">
                <!-- Tasks injected here -->
            </ul>
        </section>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Timer Settings</h2>
                <button id="closeSettingsBtn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="pomodoroLength">Pomodoro (minutes)</label>
                    <input type="number" id="pomodoroLength" min="1" max="90" value="25">
                </div>
                <div class="setting-group">
                    <label for="breakLength">Short Break (minutes)</label>
                    <input type="number" id="breakLength" min="1" max="30" value="5">
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="save-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
